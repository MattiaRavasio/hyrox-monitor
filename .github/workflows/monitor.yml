name: Hyrox Monitor

on:
  schedule:
    - cron: '0 * * * *'  # hourly, top of the hour UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: hyrox-monitor
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape and notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_WEBAPP_URL: ${{ secrets.GOOGLE_SHEETS_WEBAPP_URL }}
          GOOGLE_SHEETS_SECRET: ${{ secrets.GOOGLE_SHEETS_SECRET }}
        run: python scrape.py

      - name: Commit data.json and state.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json state.json
          if ! git diff --cached --quiet; then
            git commit -m "data: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "No changes to commit"
          fi
